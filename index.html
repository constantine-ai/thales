<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recursos Matemáticos</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- PORTADA INICIAL -->
    <div id="cover-screen" class="cover-screen active">
      <div class="cover-content">
        <h1 class="cover-title">Recursos Matemáticos</h1>
        <p class="cover-subtitle">Exploración interactiva de conceptos matemáticos</p>
        <button id="enter-btn" class="enter-button">Explorar Recursos</button>
      </div>
    </div>

    <!-- GALERÍA DE RECURSOS -->
    <div id="resources-screen" class="resources-screen">
      <header class="resources-header">
        <h1>Recursos por Nivel</h1>
        <button id="back-btn" class="back-button">← Volver</button>
      </header>

      <div class="resources-grid">
        <!-- Primero Medio -->
        <div class="level-card" data-level="1">
          <h2>Primero Medio</h2>
          <div class="resources-list">
            <button class="resource-btn" data-resource="quadratic-graph">
              📈 Plano Cartesiano y Ecuaciones Cuadráticas
            </button>
          </div>
        </div>

        <!-- Segundo Medio -->
        <div class="level-card" data-level="2">
          <h2>Segundo Medio</h2>
          <div class="resources-list">
            <button class="resource-btn" data-resource="space-rockets">
              🚀 Cohetes al Sistema Solar
            </button>
          </div>
        </div>

        <!-- Tercero Medio -->
        <div class="level-card" data-level="3">
          <h2>Tercero Medio</h2>
          <div class="resources-list">
            <button class="resource-btn" data-resource="triangle-congruence">
              🔺 Triángulos Congruentes
            </button>
          </div>
        </div>

        <!-- Cuarto Medio -->
        <div class="level-card" data-level="4">
          <h2>Cuarto Medio</h2>
          <div class="resources-list">
            <button class="resource-btn" disabled>
              🔒 Próximos recursos
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
