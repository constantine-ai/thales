<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plano Cartesiano - Ecuaciones Cuadráticas</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        body {
            background: linear-gradient(135deg, #07111f 0%, #1a2a4a 100%);
        }

        .app {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        .panel {
            background: #0f172a;
            border-right: 2px solid #334155;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel h1 {
            font-size: 1.3em;
            color: #38bdf8;
            margin: 0;
        }

        .panel p {
            color: #cbd5e1;
            font-size: 0.9em;
            margin: 0;
        }

        #equation-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .coef-control {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            color: #fbbf24;
        }

        .coef-control span {
            min-width: 20px;
        }

        .coef-control input {
            flex: 1;
            padding: 6px 8px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #f8fafc;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-row input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #ef4444, #fbbf24, #10b981);
            outline: none;
            -webkit-appearance: none;
        }

        .slider-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #38bdf8;
            cursor: pointer;
            border: 2px solid #0f172a;
        }

        .slider-row input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #38bdf8;
            cursor: pointer;
            border: 2px solid #0f172a;
        }

        .slider-row span {
            min-width: 35px;
            text-align: right;
            color: #cbd5e1;
            font-size: 0.85em;
        }

        #equation-form label {
            display: flex;
            flex-direction: column;
            gap: 4px;
            color: #fbbf24;
            font-weight: bold;
            font-size: 0.9em;
        }

        #equation-form label input {
            padding: 6px 8px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #f8fafc;
            border-radius: 4px;
            font-size: 0.9em;
        }

        #equation-form button[type="submit"] {
            padding: 10px;
            background: #10b981;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        #equation-form button[type="submit"]:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .samples {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sample-btn {
            padding: 10px;
            background: #1e293b;
            border: 1px solid #38bdf8;
            color: #38bdf8;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .sample-btn:hover {
            background: #38bdf8;
            color: #07111f;
        }

        .info-card {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid #38bdf8;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-card p {
            color: #fbbf24;
            margin: 0;
            font-size: 0.9em;
            font-family: monospace;
        }

        .graph-card {
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #graph {
            width: 100%;
            height: 100%;
            max-width: 600px;
            max-height: 600px;
        }

        .close-app-btn {
            align-self: flex-start;
            padding: 10px 15px;
            background: #38bdf8;
            color: #07111f;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .close-app-btn:hover {
            background: #0ea5e9;
            transform: translateY(-2px);
        }

        @media (max-width: 1024px) {
            .app {
                grid-template-columns: 1fr;
                height: auto;
            }

            .panel {
                border-right: none;
                border-bottom: 2px solid #334155;
                max-height: auto;
            }

            .graph-card {
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="panel">
            <button class="close-app-btn" onclick="window.history.back()">← Recursos</button>
            <h1>Plano cartesiano para ecuaciones de segundo grado</h1>
            <p>Introduce los coeficientes de una función cuadrática y observa su gráfica.</p>

            <form id="equation-form">
                <label class="coef-control">
                    <span>a</span>
                    <input id="coef-a" type="number" step="0.1" value="1" />
                </label>
                <div class="slider-row">
                    <input id="slider-a" type="range" min="-5" max="5" step="0.1" value="1" />
                    <span id="slider-a-value">1.0</span>
                </div>
                <label>
                    b
                    <input id="coef-b" type="number" step="0.1" value="-2" />
                </label>
                <label>
                    c
                    <input id="coef-c" type="number" step="0.1" value="-3" />
                </label>
                <button type="submit">Graficar</button>
            </form>

            <div class="samples">
                <button class="sample-btn" data-a="1" data-b="0" data-c="0">y = x²</button>
                <button class="sample-btn" data-a="-1" data-b="0" data-c="4">y = -x² + 4</button>
                <button class="sample-btn" data-a="1" data-b="-4" data-c="0">y = x² - 4x</button>
            </div>

            <div class="info-card">
                <p id="equation-text">y = x² - 2x - 3</p>
                <p id="vertex-text">Vértice: (1, -4)</p>
                <p id="roots-text">Raíces: x = -1 y x = 3</p>
            </div>
        </section>

        <section class="graph-card">
            <svg id="graph" viewBox="0 0 600 600" aria-label="Gráfica de la ecuación"></svg>
        </section>
    </main>

    <script>
        // ELEMENTOS DEL GRAFICADOR
        const form = document.getElementById('equation-form');
        const aInput = document.getElementById('coef-a');
        const sliderA = document.getElementById('slider-a');
        const sliderAValue = document.getElementById('slider-a-value');
        const bInput = document.getElementById('coef-b');
        const cInput = document.getElementById('coef-c');
        const equationText = document.getElementById('equation-text');
        const vertexText = document.getElementById('vertex-text');
        const rootsText = document.getElementById('roots-text');
        const graph = document.getElementById('graph');

        const svgNS = 'http://www.w3.org/2000/svg';
        const width = 600;
        const height = 600;
        const padding = 32;

        function formatNumber(value) {
            return Number.isInteger(value) ? value.toString() : value.toFixed(2);
        }

        function parseEquation() {
            const a = Number(aInput.value);
            const b = Number(bInput.value);
            const c = Number(cInput.value);
            return { a, b, c };
        }

        function syncSliderFromA() {
            const value = Number(aInput.value);
            if (!Number.isNaN(value)) {
                sliderA.value = value;
                sliderAValue.textContent = value.toFixed(1);
            }
        }

        function createText(x, y, content, className = '') {
            const text = document.createElementNS(svgNS, 'text');
            text.setAttribute('x', x);
            text.setAttribute('y', y);
            text.setAttribute('fill', '#f8fafc');
            text.setAttribute('font-size', '13');
            text.setAttribute('text-anchor', 'middle');
            text.textContent = content;
            if (className) text.setAttribute('class', className);
            return text;
        }

        function getNiceStep(range) {
            if (range <= 0) return 1;
            const roughStep = range / 6;
            const magnitude = 10 ** Math.floor(Math.log10(roughStep));
            const normalized = roughStep / magnitude;
            const niceStep = normalized < 1.5 ? 1 : normalized < 3 ? 2 : normalized < 7 ? 5 : 10;
            return niceStep * magnitude;
        }

        function drawGraph({ a, b, c }) {
            graph.innerHTML = '';

            const xMin = -10;
            const xMax = 10;
            const step = 0.08;
            const points = [];
            let yValues = [];

            for (let x = xMin; x <= xMax; x += step) {
                const y = a * x * x + b * x + c;
                yValues.push(y);
                points.push([x, y]);
            }

            let yMin = Math.min(...yValues);
            let yMax = Math.max(...yValues);
            const margin = Math.max(2, Math.abs(yMax - yMin) * 0.2);

            yMin -= margin;
            yMax += margin;

            const xRange = xMax - xMin;
            const yRange = yMax - yMin;
            const xStep = getNiceStep(xRange);
            const yStep = getNiceStep(yRange);

            const mapX = (x) => padding + ((x - xMin) / xRange) * (width - padding * 2);
            const mapY = (y) => height - padding - ((y - yMin) / yRange) * (height - padding * 2);

            const grid = document.createElementNS(svgNS, 'g');
            grid.setAttribute('stroke', '#334155');
            grid.setAttribute('stroke-width', '1');

            for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax; x += xStep) {
                const xPos = mapX(x);
                const line = document.createElementNS(svgNS, 'line');
                line.setAttribute('x1', xPos);
                line.setAttribute('x2', xPos);
                line.setAttribute('y1', padding);
                line.setAttribute('y2', height - padding);
                grid.appendChild(line);
                if (x !== 0) {
                    grid.appendChild(createText(xPos, height - 12, x.toString()));
                }
            }

            for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax; y += yStep) {
                const yPos = mapY(y);
                const line = document.createElementNS(svgNS, 'line');
                line.setAttribute('x1', padding);
                line.setAttribute('x2', width - padding);
                line.setAttribute('y1', yPos);
                line.setAttribute('y2', yPos);
                grid.appendChild(line);
                if (y !== 0) {
                    grid.appendChild(createText(16, yPos + 4, y.toString()));
                }
            }
            graph.appendChild(grid);

            const axes = document.createElementNS(svgNS, 'g');
            axes.setAttribute('stroke', '#f8fafc');
            axes.setAttribute('stroke-width', '2');

            const xAxis = document.createElementNS(svgNS, 'line');
            xAxis.setAttribute('x1', padding);
            xAxis.setAttribute('x2', width - padding);
            xAxis.setAttribute('y1', mapY(0));
            xAxis.setAttribute('y2', mapY(0));
            axes.appendChild(xAxis);

            const yAxis = document.createElementNS(svgNS, 'line');
            yAxis.setAttribute('x1', mapX(0));
            yAxis.setAttribute('x2', mapX(0));
            yAxis.setAttribute('y1', padding);
            yAxis.setAttribute('y2', height - padding);
            axes.appendChild(yAxis);

            axes.appendChild(createText(width - 18, mapY(0) - 8, 'x'));
            axes.appendChild(createText(mapX(0) + 12, 20, 'y'));
            graph.appendChild(axes);

            const path = document.createElementNS(svgNS, 'path');
            const d = points
                .map(([x, y], index) => {
                    const command = index === 0 ? 'M' : 'L';
                    return `${command}${mapX(x).toFixed(2)},${mapY(y).toFixed(2)}`;
                })
                .join(' ');

            path.setAttribute('d', d);
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke', '#38bdf8');
            path.setAttribute('stroke-width', '3');
            path.setAttribute('stroke-linejoin', 'round');
            graph.appendChild(path);

            const vertexX = a === 0 ? null : -b / (2 * a);
            const vertexY = a === 0 ? null : a * vertexX * vertexX + b * vertexX + c;
            const vertexPoint = document.createElementNS(svgNS, 'circle');
            vertexPoint.setAttribute('cx', mapX(vertexX));
            vertexPoint.setAttribute('cy', mapY(vertexY));
            vertexPoint.setAttribute('r', '6');
            vertexPoint.setAttribute('fill', '#f59e0b');
            graph.appendChild(vertexPoint);

            const discriminant = b * b - 4 * a * c;
            let roots = [];
            if (a !== 0) {
                if (discriminant > 0) {
                    roots = [(-b - Math.sqrt(discriminant)) / (2 * a), (-b + Math.sqrt(discriminant)) / (2 * a)];
                } else if (discriminant === 0) {
                    roots = [(-b) / (2 * a)];
                }
            }

            const equationTextValue = `y = ${formatNumber(a)}x² ${b >= 0 ? '+' : '-'} ${Math.abs(formatNumber(b))}x ${c >= 0 ? '+' : '-'} ${Math.abs(formatNumber(c))}`;
            equationText.textContent = equationTextValue;
            vertexText.textContent = vertexX === null ? 'Vértice: no aplica' : `Vértice: (${formatNumber(vertexX)}, ${formatNumber(vertexY)})`;
            rootsText.textContent = roots.length === 0 ? 'Raíces: no reales' : `Raíces: ${roots.map((root) => formatNumber(root)).join(' y ')}`;
        }

        form.addEventListener('submit', (event) => {
            event.preventDefault();
            drawGraph(parseEquation());
        });

        aInput.addEventListener('input', () => {
            syncSliderFromA();
            drawGraph(parseEquation());
        });

        sliderA.addEventListener('input', () => {
            aInput.value = sliderA.value;
            sliderAValue.textContent = Number(sliderA.value).toFixed(1);
            drawGraph(parseEquation());
        });

        document.querySelectorAll('.sample-btn').forEach((button) => {
            button.addEventListener('click', () => {
                aInput.value = button.dataset.a;
                sliderA.value = button.dataset.a;
                sliderAValue.textContent = Number(button.dataset.a).toFixed(1);
                bInput.value = button.dataset.b;
                cInput.value = button.dataset.c;
                drawGraph(parseEquation());
            });
        });

        // INICIALIZAR APLICACIÓN
        syncSliderFromA();
        drawGraph(parseEquation());
    </script>
</body>
</html>
